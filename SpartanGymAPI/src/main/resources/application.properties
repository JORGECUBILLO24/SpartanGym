spring.application.name=SpartanGymAPI
# Perfil activo por defecto. "local" carga application-local.properties (ej. Neon) si existe.
# En la nube (Render) se sobreescribe con la variable SPRING_PROFILES_ACTIVE.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Puerto: en local usa 8080; en la nube (Render) toma el que asigne la variable PORT.
server.port=${PORT:8080}

# PostgreSQL. En local usa los valores por defecto; en la nube (Neon/Render) se
# sobreescriben con variables de entorno para no exponer credenciales en el repo.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spartangym_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate. The schema is managed by spartan_gym_schema.sql.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT. El secreto se toma de la variable JWT_SECRET en produccion.
jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3JldEtleUZvclNwYXJ0YW5HeW1BUEkyMDI2MTIzNDU2Nzg5}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Password reset
app.web.reset-password-url=${APP_WEB_RESET_PASSWORD_URL:http://localhost:5173/restablecer-contrasena}
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}

# Mail is optional in local development.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
